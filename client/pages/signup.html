<!DOCTYPE html>
<html lang="en">


<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <title>Signup | ShopEase</title>


    <!-- CSS -->

    <link rel="stylesheet" href="../css/style.css">

    <link rel="stylesheet" href="../css/auth.css">

    <link rel="stylesheet" href="../css/responsive.css">


</head>



<body>




<!-- ==========================
     NAVBAR
========================== -->


<header class="navbar">


<div class="container navbar-container">



<div class="logo">

<a href="../index.html" style="text-decoration: none; color: #2c3e50; font-weight: 700; font-size: 1.5rem;">

ShopEase

</a>

</div>





<nav class="nav-links">


<a href="../index.html">
Home
</a>


<a href="products.html">
Products
</a>


<a href="cart.html">
Cart
</a>


</nav>



</div>


</header>








<!-- ==========================
     SIGNUP SECTION
========================== -->


<section class="auth-section">


<div class="auth-container">






<div class="auth-header">


<h1>
Create Account
</h1>


<p>
Join ShopEase today
</p>


</div>









<!-- ERROR MESSAGE -->


<div class="error-message">

</div>






<!-- SIGNUP FORM -->


<form id="signupForm"
class="auth-form">







<div class="input-group">


<label for="signupName">

Full Name

</label>



<input

type="text"

id="signupName"

placeholder="Enter your name"

required>


</div>









<div class="input-group">


<label for="signupEmail">

Email

</label>



<input

type="email"

id="signupEmail"

placeholder="Enter your email"

required>


</div>









<div class="input-group">


<label for="signupPassword">

Password

</label>





<div class="password-wrapper">


<input

type="password"

id="signupPassword"

placeholder="Create password"

required>



<span class="password-toggle">

👁️

</span>



</div>


</div>









<div class="input-group">


<label for="confirmPassword">

Confirm Password

</label>






<div class="password-wrapper">


<input

type="password"

id="confirmPassword"

placeholder="Confirm password"

required>



<span class="password-toggle">

👁️

</span>



</div>



</div>









<div class="form-options">



<label>


<input

type="checkbox"

required>


I agree to Terms & Conditions


</label>



</div>









<button

type="submit"

class="auth-btn">


Create Account


</button>







</form>









<!-- DIVIDER -->


<div class="divider">


<span>
OR
</span>


</div>









<!-- SOCIAL BUTTONS -->


<div class="social-login">


<button class="social-btn">

Google

</button>



<button class="social-btn">

GitHub

</button>



</div>









<!-- LOGIN LINK -->


<div class="auth-footer">


<p>


Already have an account?


<a href="login.html">

Login

</a>


</p>


</div>








</div>


</section>









<!-- ==========================
     FOOTER
========================== -->


<footer class="footer">


<div class="container footer-content">



<div>


<h3>
ShopEase
</h3>


<p>
Smart shopping made simple.
</p>


</div>






<div>


<h3>
Quick Links
</h3>


<a href="../index.html">
Home
</a>


<a href="products.html">
Products
</a>


<a href="cart.html">
Cart
</a>


</div>







<div>


<h3>
Contact
</h3>


<p>
support@shopease.com
</p>


</div>





</div>


</footer>









<!-- JavaScript -->


<script src="../js/main.js"></script>

<script src="../js/api.js"></script>

<script src="../js/auth.js"></script>



</body>


</html>
