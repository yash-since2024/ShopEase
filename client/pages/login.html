<!DOCTYPE html>
<html lang="en">


<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <title>Login | ShopEase</title>


    <!-- CSS -->

    <link rel="stylesheet" href="../css/style.css">

    <link rel="stylesheet" href="../css/auth.css">

    <link rel="stylesheet" href="../css/responsive.css">


</head>



<body>



<!-- ==========================
     NAVBAR
========================== -->


<header class="navbar">


<div class="container navbar-container">



<div class="logo">

<a href="../index.html" style="text-decoration: none; color: #2c3e50; font-weight: 700; font-size: 1.5rem;">

ShopEase

</a>

</div>





<nav class="nav-links">


<a href="../index.html">
Home
</a>


<a href="products.html">
Products
</a>


<a href="cart.html">
Cart
</a>


</nav>






</div>


</header>








<!-- ==========================
     LOGIN SECTION
========================== -->


<section class="auth-section">



<div class="auth-container">





<div class="auth-header">


<h1>
Welcome Back
</h1>


<p>
Login to continue shopping
</p>


</div>








<!-- ERROR MESSAGE -->


<div class="error-message">

</div>








<!-- LOGIN FORM -->


<form id="loginForm"
class="auth-form">






<div class="input-group">


<label for="loginEmail">

Email

</label>


<input

type="email"

id="loginEmail"

placeholder="Enter your email"

required>


</div>









<div class="input-group">


<label for="loginPassword">

Password

</label>





<div class="password-wrapper">



<input

type="password"

id="loginPassword"

placeholder="Enter your password"

required>




<span class="password-toggle">

👁️

</span>



</div>


</div>









<div class="form-options">



<label>


<input 

type="checkbox">


Remember me


</label>





<a href="#">

Forgot Password?

</a>



</div>









<button

type="submit"

class="auth-btn">


Login


</button>





</form>









<!-- DIVIDER -->


<div class="divider">


<span>
OR
</span>


</div>








<!-- SOCIAL LOGIN -->


<div class="social-login">


<button class="social-btn">

Google

</button>



<button class="social-btn">

GitHub

</button>



</div>








<!-- REGISTER LINK -->


<div class="auth-footer">


<p>


Don't have an account?


<a href="signup.html">

Create Account

</a>


</p>


</div>







</div>



</section>









<!-- ==========================
     FOOTER
========================== -->


<footer class="footer">


<div class="container footer-content">



<div>


<h3>
ShopEase
</h3>


<p>
Smart shopping made simple.
</p>


</div>





<div>


<h3>
Links
</h3>


<a href="../index.html">
Home
</a>


<a href="products.html">
Products
</a>


<a href="cart.html">
Cart
</a>


</div>






<div>


<h3>
Contact
</h3>


<p>
support@shopease.com
</p>


</div>





</div>


</footer>








<!-- JavaScript -->


<script src="../js/main.js"></script>

<script src="../js/api.js"></script>

<script src="../js/auth.js"></script>



</body>


</html>
